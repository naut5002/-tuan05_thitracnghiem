services:
  - type: web
    name: tuan05-thitracnghiem
    runtime: node
    plan: starter
    buildCommand: ""
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 22.20.0
      - key: DATA_DIR
        value: /opt/render/project/src/data
    disk:
      name: app-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
